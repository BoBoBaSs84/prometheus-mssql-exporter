# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]
        mssql-version: ["2017-latest", "2019-latest", "2022-latest"]

    env:
      # Use a repository secret `SA_PASSWORD` (set in Settings > Secrets)
      SA_PASSWORD: ${{ secrets.SA_PASSWORD }}

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:${{ matrix.mssql-version }}
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: ${{ env.SA_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd="bash -c '/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"$SA_PASSWORD\" -Q \"select 1\" >/dev/null 2>&1'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (if present)
        run: npm run build --if-present

      - name: Wait for MSSQL TCP port
        run: |
          echo "Waiting for MSSQL TCP port on mssql:1433"
          for i in {1..60}; do
            if timeout 1 bash -c "cat < /dev/tcp/mssql/1433" >/dev/null 2>&1; then
              echo "mssql TCP port open"; break
            fi
            echo "waiting for mssql... ($i)"; sleep 5
          done

      - name: Verify MSSQL SQL connection (using tedious)
        env:
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
        run: |
          node -e "const { Connection } = require('tedious'); const config={server:'mssql',authentication:{type:'default',options:{userName:'SA',password:process.env.SA_PASSWORD}},options:{encrypt:false,trustServerCertificate:true,connectTimeout:15000}}; const conn=new Connection(config); conn.on('connect', err=>{ if(err){ console.error('connection error',err.message||err); process.exit(1);} else{ console.log('connected to mssql'); process.exit(0);} }); conn.connect();"

      - name: Start exporter (background)
        env:
          SERVER: mssql
          USERNAME: SA
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
          PASSWORD: ${{ secrets.SA_PASSWORD }}
          DEBUG: app,db,metrics
        run: |
          nohup npm start > exporter.log 2>&1 &

      - name: Wait for exporter to be ready
        run: |
          echo "Waiting for exporter to respond on http://localhost:4000/metrics"
          for i in {1..60}; do
            if curl -sSf http://localhost:4000/metrics >/dev/null; then
              echo "exporter is up"; exit 0
            fi
            echo "waiting... ($i)"
            sleep 5
          done
          echo "exporter did not start in time"; cat exporter.log; exit 1

      - name: Run tests
        run: npm test
